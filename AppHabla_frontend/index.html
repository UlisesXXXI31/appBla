<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica de Alemán con Gemini</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="container">
        <h1>🗣️ Tutor de Alemán (Beta)</h1>

        <label for="tema-select">Selecciona el Tema:</label>
        <select id="tema-select"></select>
        
        <div id="status-display" class="message-box">
            Inicia tu sesión.
        </div>
       <!-- Un diseño sencillo y claro para adolescentes -->
      <div id="timer-box" style="font-family: 'Courier New', Courier, monospace; font-size: 1.5rem; text-align: center; margin: 15px 0; color: #555;">
    ⏱️ <span id="timer-display">5:00</span>
     </div>
        <button id="mic-button">
            🎙️ Hablar
        </button>

        <button id="end-session-button" class="end-button">
            Finalizar Sesión
        </button>
    </div>
<script src="https://elevenlabs.io/convai-sdk/js/v1/index.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
